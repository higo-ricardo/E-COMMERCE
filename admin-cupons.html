<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>document.documentElement.classList.add("js-ready")</script>
<script>(function(){const apply=()=>{const body=document.body; if(!body) return; if(localStorage.getItem('hivercar-theme')==='light') body.classList.add('light-mode');}; if (document.body) apply(); else document.addEventListener('DOMContentLoaded', apply);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cupons — HIVERCAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/loja.css">
<link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/dashboard-cupons.css">
</head>
<body class="dashboard">
<div class="grid-bg"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-brand">
    <div class="brand-dot"></div>
    <span class="sidebar-brand-text">HIVER<em>CAR</em></span>
  </a>
  <div class="sidebar-role">Administrador</div>
  <nav>
    <a href="dashboard.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a href="admin-pedidos.html"><i class="fas fa-chart-line"></i> Pedidos</a>
    <a href="admin-produtos.html"><i class="fas fa-box-open"></i> Produtos</a>
    <a href="admin-estoque.html"><i class="fas fa-warehouse"></i> Estoque</a>
    <a href="admin-os.html"><i class="fas fa-wrench"></i> O. de Serviço</a>
    <a href="admin-fiscal.html"><i class="fas fa-receipt"></i> Fiscal</a>
    <a href="admin-relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a>
    <a href="admin-cupons.html" class="active"><i class="fas fa-tags"></i> Cupons</a>
    <a href="customers.html"><i class="fas fa-users"></i> Clientes</a>
    <a href="loja.html"><i class="fas fa-store"></i> Loja</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="theme-toggle sidebar-theme" id="themeToggle" aria-label="Alternar tema" title="Alternar tema">
      <i class="fas fa-moon"></i>
    </button>
    <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sair</a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
    <h1 class="topbar-title">Cupons & Promoções</h1>
    <div class="small" id="statusText">Pronto</div>
  </header>
  <div class="content-admin">
    <div class="dashboard-grid">
    <section id="coupon-form" class="card" aria-labelledby="formHeading">
      <div class="flex-between">
        <h2 id="formHeading">Novo cupom</h2>
        <button class="ghost" id="btnResetForm" aria-label="Limpar formulário">Limpar</button>
      </div>
      <form id="formCupom" novalidate>
        <div class="row">
          <div>
            <label for="code">Código (maiúsculas) <span aria-hidden="true">*</span><span class="sr-only"> (obrigatório)</span></label>
            <input id="code" name="code" maxlength="32" placeholder="BLACK50" required aria-required="true" autocomplete="off" style="text-transform:uppercase">
          </div>
          <div>
            <label for="type">Tipo <span aria-hidden="true">*</span><span class="sr-only"> (obrigatório)</span></label>
            <select id="type" name="type" required aria-required="true">
              <option value="percentage">Percentual (%)</option>
              <option value="fixed">Valor fixo (R$)</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label for="value">Valor <span aria-hidden="true">*</span><span class="sr-only"> (obrigatório)</span></label>
            <input id="value" name="value" type="number" min="1" placeholder="Ex.: 50" required aria-required="true" inputmode="decimal">
          </div>
          <div>
            <label for="maxDiscount">Teto (R$) <span class="text-muted">(opcional)</span></label>
            <input id="maxDiscount" name="maxDiscount" type="number" min="0" step="0.01" placeholder="Ex.: 200" inputmode="decimal">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="minOrderValue">Pedido mínimo (R$)</label>
            <input id="minOrderValue" name="minOrderValue" type="number" min="0" step="0.01" value="50" inputmode="decimal">
          </div>
          <div>
            <label for="expirationDate">Validade <span class="text-muted">(opcional)</span></label>
            <input id="expirationDate" name="expirationDate" type="date">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="usageLimit">Limite global <span class="text-muted">(opcional)</span></label>
            <input id="usageLimit" name="usageLimit" type="number" min="0" placeholder="Ex.: 100" inputmode="numeric">
          </div>
          <div>
            <label for="cpfLimit">Limite por CPF <span class="text-muted">(opcional)</span></label>
            <input id="cpfLimit" name="cpfLimit" type="number" min="0" placeholder="Ex.: 1" inputmode="numeric">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="cpf">CPF restrito <span class="text-muted">(opcional)</span></label>
            <input id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" inputmode="numeric">
          </div>
          <div class="flex items-center gap-3" style="margin-top:24px;">
            <input id="isActive" name="isActive" type="checkbox" checked>
            <label for="isActive" style="margin:0; cursor:pointer">Ativo</label>
          </div>
        </div>
        <div class="actions">
          <button type="submit" id="btnSalvar">Salvar cupom</button>
          <div class="msg" id="formMsg" role="alert" aria-live="polite"></div>
        </div>
      </form>
    </section>

    <section id="coupon-list" aria-labelledby="listHeading">
      <div class="flex-between">
        <h2 id="listHeading">Lista de cupons</h2>
        <button class="ghost" id="btnReload" aria-label="Recarregar lista">Recarregar</button>
      </div>
      <div class="table-wrap" role="region" aria-label="Tabela de cupons" tabindex="0">
        <table>
          <thead>
            <tr>
              <th scope="col">Código</th>
              <th scope="col">Tipo</th>
              <th scope="col">Valor</th>
              <th scope="col">Status</th>
              <th scope="col">Uso</th>
              <th scope="col">Validade</th>
              <th scope="col">CPF</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="text-muted text-center" style="padding:24px">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="msg" id="listMsg" role="alert" aria-live="polite"></div>
    </section>
    </div><!-- /dashboard-grid -->
  </div><!-- /content-admin -->
</div><!-- /main -->

<script type="module">
import { AdminPage, fmtBRL, esc } from "./js/admin-core.js";
import { CouponService } from "./js/couponService.js";

class CuponsPage extends AdminPage {
  onInit() {
    this.bindEvents();
    this.renderList();
  }

  bindEvents() {
    document.getElementById("formCupom").addEventListener("submit", e => this.handleSubmit(e));
    document.getElementById("btnResetForm").addEventListener("click", () => this.resetForm());
    document.getElementById("btnReload").addEventListener("click", () => this.renderList());
  }

  async renderList() {
    try {
      const list = await CouponService.list();
      const tbody = document.getElementById("tableBody");
      const msgEl = document.getElementById("listMsg");

      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-muted text-center" style="padding:24px">Nenhum cupom cadastrado.</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map(c => `
        <tr>
          <td class="text-green text-sm font-bold" style="font-family:monospace">${esc(c.code)}</td>
          <td class="uppercase text-xs">${esc(c.type)}</td>
          <td class="font-semibold">${c.type === "percentage" || c.type === "percentual" ? c.value + "%" : fmtBRL(c.value)}</td>
          <td><span class="badge ${c.isActive ? 'badge-green' : 'badge-red'}">${c.isActive ? "Ativo" : "Inativo"}</span></td>
          <td class="text-xs text-muted">${c.timesUsed || 0}${c.usageLimit ? ' / ' + c.usageLimit : ''}</td>
          <td class="text-xs text-muted">${c.expirationDate ? new Date(c.expirationDate).toLocaleDateString("pt-BR") : "-"}</td>
          <td class="text-xs text-muted">${c.cpf || "-"}</td>
        </tr>
      `).join("");

      document.getElementById("statusText").textContent = `${list.length} cupom(ns) carregado(s)`;
      msgEl.textContent = "";
    } catch (e) {
      console.error("[Cupons] Erro ao carregar:", e);
      document.getElementById("listMsg").textContent = "Erro ao carregar cupons.";
    }
  }

  async handleSubmit(e) {
    e.preventDefault();
    const form = document.getElementById("formCupom");
    const formData = new FormData(form);

    const payload = {
      code: formData.get("code")?.trim().toUpperCase(),
      type: formData.get("type"),
      value: parseFloat(formData.get("value")) || 0,
      maxDiscount: parseFloat(formData.get("maxDiscount")) || null,
      minOrderValue: parseFloat(formData.get("minOrderValue")) || null,
      expirationDate: formData.get("expirationDate") || null,
      usageLimit: parseInt(formData.get("usageLimit")) || null,
      cpfLimit: parseInt(formData.get("cpfLimit")) || null,
      cpf: formData.get("cpf")?.replace(/\D/g, "") || null,
      isActive: formData.get("isActive") !== null,
    };

    if (!payload.code) {
      document.getElementById("formMsg").textContent = "Código é obrigatório.";
      document.getElementById("formMsg").className = "msg err";
      return;
    }

    const btn = document.getElementById("btnSalvar");
    this.setLoading(btn, true);

    try {
      await CouponService.create(payload);
      document.getElementById("formMsg").textContent = "Cupom salvo com sucesso!";
      document.getElementById("formMsg").className = "msg ok";
      form.reset();
      this.renderList();
    } catch (e) {
      document.getElementById("formMsg").textContent = "Erro ao salvar: " + e.message;
      document.getElementById("formMsg").className = "msg err";
    } finally {
      this.setLoading(btn, false);
    }
  }

  resetForm() {
    document.getElementById("formCupom").reset();
    document.getElementById("formMsg").textContent = "";
  }
}

// Máscara CPF
document.getElementById("cpf")?.addEventListener("input", e => {
  let v = e.target.value.replace(/\D/g,"").slice(0,11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,"$1.$2.$3-$4");
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d+)/,"$1.$2.$3");
  else if (v.length > 3) v = v.replace(/(\d{3})(\d+)/,"$1.$2");
  e.target.value = v;
});

const page = new CuponsPage();
page.init();
</script>
</body>
</html>
