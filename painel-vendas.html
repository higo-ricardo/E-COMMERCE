<style>
/* ── PDV Layout ── */
body.painel-vendas {
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
}

.pdv-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* Header PDV */
.pdv-header {
  background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
  border: 2px solid #3a3a5c;
  border-radius: 8px;

  margin-bottom: 20px;

  justify-content: space-between;
  align-items: center;

}

.pdv-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: #26fd71;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(38,253,113,0.3);
}

.pdv-subtitle {
  font-size: 14px;
  color: #888;
  margin-top: 5px;
}

.pdv-user-info {
  text-align: right;
  color: #ccc;
}

.pdv-user-info .user-name {
  font-weight: 600;
  color: #fff;
  font-size: 16px;
}

.pdv-user-info .user-role {
  font-size: 12px;
  color: #26fd71;
}

/* CPF Input */
.pdv-cpf-box {
  margin-bottom: 20px;
}

.pdv-cpf-input {
  width: 100%;
  padding: 12px 15px;
  background: #0d0d1a;
  border: 2px solid #2d2d44;
  border-radius: 6px;
  color: #fff;
  font-size: 16px;
  font-family: 'Roboto Mono', monospace;
  transition: border-color 0.2s;
}

.pdv-cpf-input:focus {
  outline: none;
  border-color: #26fd71;
  box-shadow: 0 0 10px rgba(38,253,113,0.2);
}

.pdv-cpf-input::placeholder {
  color: #555;
}

.pdv-cpf-label {
  display: block;
  color: #888;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Main PDV Grid */
.pdv-grid {
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 20px;
  margin-bottom: 20px;
}

/* Painel Esquerdo - Produto */
.pdv-product-panel {
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  border: 2px solid #2d2d44;
  border-radius: 8px;
  padding: 20px;

}

.pdv-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 2px solid #26fd71;
  display: flex;
  align-items: center;
  gap: 10px;
}

.pdv-section-title i {
  color: #26fd71;
}

/* Product Search */
.pdv-search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.pdv-search-input {
  flex: 1;
  padding: 12px 15px;
  background: #0d0d1a;
  border: 2px solid #2d2d44;
  border-radius: 6px;
  color: #fff;
  font-size: 16px;
  font-family: 'Roboto Mono', monospace;
  transition: border-color 0.2s;
}

.pdv-search-input:focus {
  outline: none;
  border-color: #26fd71;
  box-shadow: 0 0 10px rgba(38,253,113,0.2);
}

.pdv-search-input::placeholder {
  color: #555;
}

/* Product Info Display */
.pdv-product-display {
  background: #0d0d1a;
  border: 2px solid #2d2d44;
  border-radius: 6px;
  padding: 20px;
  margin-bottom: 20px;
  min-height: 200px;
}

.pdv-product-name {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 15px;
  padding-bottom: 15px;
  border-bottom: 1px solid #2d2d44;
}

.pdv-product-detail {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.pdv-detail-label {

}

.pdv-detail-value {

}

.pdv-price-highlight {

}

/* Cart Items */
.pdv-cart {

  padding: 20px;

}

.pdv-cart-items {

  border: 2px solid #2d2d44;
  border-radius: 6px;
  padding: 15px;
  margin-bottom: 20px;

}

.pdv-cart-item {

  justify-content: space-between;
  align-items: center;

  border-bottom: 1px solid #2d2d44;

.pdv-cart-item:hover {

}

.pdv-cart-item:last-child {

}

.pdv-item-info {

}

  font-weight: 600;

}

.pdv-item-qty {

}

.pdv-item-price {

.pdv-item-remove {

.pdv-item-remove:hover {

  color: #fff;

/* Quantity Control */
.pdv-qty-control {

.pdv-qty-btn {

}

.pdv-qty-btn:hover {

}

.pdv-btn-add {

  border-radius: 6px;

}

.pdv-btn-add:hover {

.pdv-btn-add:active {

.pdv-btn-cancel-inline:hover {

}

.pdv-qty-input:focus {

.pdv-total-display {

.pdv-total-value {

.pdv-btn:active {

.pdv-empty-cart {

.pdv-empty-cart i {

.pdv-empty-cart p {

.pdv-search-results {
  background: #0d0d1a;
  border: 2px solid #2d2d44;

  max-height: 200px;

.pdv-search-results.active {

.pdv-search-item {

  border-bottom: 1px solid #2d2d44;

.pdv-search-item:hover {

}

.pdv-search-item:last-child {

}

.pdv-search-item-name {
  color: #fff;
  font-size: 14px;
  font-weight: 600;

}

.pdv-search-item-price {

/* Responsive */

<script type="module">
import { AdminPage, fmtBRL } from "./js/admin-core.js";
import { CONFIG } from "./js/config.js";
import { ProductService } from "./js/productService.js";

class PDVPage extends AdminPage {
  cart = [];
  currentProduct = null;

  onInit() {
    this.bindEvents();
    this.loadUser();
  }

  bindEvents() {
    // Search with debounce
    let searchTimeout;
    document.getElementById('productSearch').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => this.searchProduct(e.target.value), 300);
    });

    // Enter key to add product
    document.getElementById('productSearch').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && this.currentProduct) {
        this.addToCart();
      }
    });

    // Quantity change
    document.getElementById('qtyInput').addEventListener('change', (e) => {
      const qty = parseInt(e.target.value);
      if (qty < 1) e.target.value = 1;
    });

    // CPF mask
    document.getElementById('cpfInput').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 11) value = value.slice(0, 11);
      
      if (value.length > 9) {
        value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      } else if (value.length > 6) {
        value = value.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
      } else if (value.length > 3) {
        value = value.replace(/(\d{3})(\d{1,3})/, '$1.$2');
      }
      
      e.target.value = value;
    });
  }

  loadUser() {
    try {
      const user = this.app.account.get();
      user.then(u => {
        document.getElementById('userName').textContent = u.name || u.email;
      }).catch(() => {});
    } catch (e) {}
  }

  async searchProduct(term) {
    if (!term || term.length < 2) {
      document.getElementById('searchResults').classList.remove('active');
      return;
    }

    try {
      const result = await ProductService.search(term, 1, {});
      this.displaySearchResults(result.products);
    } catch (e) {
      console.error('[PDV] Erro na busca:', e);
    }
  }

  displaySearchResults(products) {
    const container = document.getElementById('searchResults');
    
    if (products.length === 0) {
      container.innerHTML = '<div class="pdv-search-item"><div class="pdv-search-item-name">Nenhum produto encontrado</div></div>';
      container.classList.add('active');
      return;
    }

    container.innerHTML = products.map(p => `
      <div class="pdv-search-item" onclick="window.pdvPage.selectProduct('${p.$id}')">
        <div class="pdv-search-item-name">${p.name}</div>
        <div class="pdv-search-item-price">${fmtBRL(p.price)}</div>
      </div>
    `).join('');

    container.classList.add('active');
  }

  async selectProduct(id) {
    try {
      const product = await ProductService.list(1, {});
      const p = product.products.find(x => x.$id === id);
      
      if (p) {
        this.currentProduct = p;
        this.displayProduct(p);
        document.getElementById('searchResults').classList.remove('active');
        document.getElementById('productSearch').value = p.name;
        document.getElementById('qtyControl').style.display = 'flex';
        document.getElementById('qtyInput').value = 1;
      }
    } catch (e) {
      console.error('[PDV] Erro ao selecionar produto:', e);
    }
  }

  displayProduct(product) {
    const display = document.getElementById('productDisplay');
    display.innerHTML = `
      <div class="pdv-product-name">${product.name}</div>
      <div class="pdv-product-detail">
        <div class="pdv-detail-label">SKU:</div>
        <div class="pdv-detail-value">${product.sku || '-'}</div>
      </div>
      <div class="pdv-product-detail">
        <div class="pdv-detail-label">Estoque:</div>
        <div class="pdv-detail-value">${product.stock || 0} unidades</div>
      </div>
      <div class="pdv-product-detail">
        <div class="pdv-detail-label">Preço Unitário:</div>
        <div class="pdv-detail-value pdv-price-highlight">${fmtBRL(product.price)}</div>
      </div>
      <div class="pdv-product-detail">
        <div class="pdv-detail-label">Subtotal:</div>
        <div class="pdv-detail-value pdv-price-highlight" id="productSubtotal">${fmtBRL(product.price)}</div>
      </div>
    `;

    // Update subtotal on qty change
    document.getElementById('qtyInput').addEventListener('input', () => {
      const qty = parseInt(document.getElementById('qtyInput').value) || 1;
      document.getElementById('productSubtotal').textContent = fmtBRL(product.price * qty);
    });
  }

  changeQty(delta) {
    const input = document.getElementById('qtyInput');
    let qty = parseInt(input.value) + delta;
    if (qty < 1) qty = 1;
    input.value = qty;
    
    if (this.currentProduct) {
      document.getElementById('productSubtotal').textContent = fmtBRL(this.currentProduct.price * qty);
    }
  }

  addToCart() {
    if (!this.currentProduct) return;

    const qty = parseInt(document.getElementById('qtyInput').value) || 1;
    
    // Check if product already in cart
    const existingItem = this.cart.find(item => item.$id === this.currentProduct.$id);
    
    if (existingItem) {
      existingItem.qty += qty;
    } else {
      this.cart.push({
        $id: this.currentProduct.$id,
        name: this.currentProduct.name,
        price: this.currentProduct.price,
        qty: qty
      });
    }

    this.renderCart();
    this.clearProductSelection();
    this.toast('Produto adicionado ao carrinho', 'ok');
  }

  clearProductSelection() {
    this.currentProduct = null;
    document.getElementById('productSearch').value = '';
    document.getElementById('qtyControl').style.display = 'none';
    document.getElementById('productDisplay').innerHTML = `
      <div class="pdv-empty-cart">
        <i class="fas fa-box-open"></i>
        <p>Busque um produto para iniciar a venda</p>
      </div>
    `;
  }

  removeFromCart(productId) {
    this.cart = this.cart.filter(item => item.$id !== productId);
    this.renderCart();
  }

  renderCart() {
    const container = document.getElementById('cartItems');
    
    if (this.cart.length === 0) {
      container.innerHTML = `
        <div class="pdv-empty-cart">
          <i class="fas fa-shopping-cart"></i>
          <p>Carrinho vazio</p>
        </div>
      `;
      document.getElementById('cartTotal').textContent = 'R$ 0,00';
      return;
    }

    container.innerHTML = this.cart.map(item => `
      <div class="pdv-cart-item">
        <div class="pdv-item-info">
          <div class="pdv-item-name">${item.name}</div>
          <div class="pdv-item-qty">${item.qty}x ${fmtBRL(item.price)}</div>
        </div>
        <div class="pdv-item-price">${fmtBRL(item.price * item.qty)}</div>
        <button class="pdv-item-remove" onclick="window.pdvPage.removeFromCart('${item.$id}')">
          <i class="fas fa-times"></i>
        </button>
      </div>
    `).join('');

    const total = this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    document.getElementById('cartTotal').textContent = fmtBRL(total);
  }

  clearCart() {
    if (this.cart.length === 0 && !this.currentProduct) return;

    // Modal de confirmação
    const modal = document.createElement('div');
    modal.style.cssText = `
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    `;
    modal.innerHTML = `
      <div style="
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border: 2px solid #ef4444;
        border-radius: 12px;
        padding: 30px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 0 40px rgba(239,68,68,0.3);
      ">
        <h3 style="
          color: #ef4444;
          font-family: 'Bebas Neue', sans-serif;
          font-size: 24px;
          margin-bottom: 15px;
          letter-spacing: 1px;
        ">
          <i class="fas fa-exclamation-triangle"></i> CONFIRMAR CANCELAMENTO
        </h3>
        <p style="color: #ccc; margin-bottom: 25px; line-height: 1.6;">
          Deseja realmente cancelar esta venda?<br>
          <strong style="color: #fff;">${this.cart.length} item(ns)</strong> serão removidos do carrinho.
        </p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button id="confirmCancelNo" style="
            padding: 12px;
            background: #2d2d44;
            border: 2px solid #3a3a5c;
            border-radius: 6px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
          ">NÃO</button>
          <button id="confirmCancelYes" style="
            padding: 12px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
          ">SIM, CANCELAR</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    document.getElementById('confirmCancelNo').onclick = () => modal.remove();
    document.getElementById('confirmCancelYes').onclick = () => {
      this.cart = [];
      this.currentProduct = null;
      this.renderCart();
      this.clearProductSelection();
      document.getElementById('cpfInput').value = '';
      modal.remove();
      this.toast('Venda cancelada', 'ok');
    };

    // Fechar modal ao clicar fora
    modal.onclick = (e) => {
      if (e.target === modal) modal.remove();
    };
  }

  applyDiscount() {
    this.toast('Funcionalidade em desenvolvimento', 'ok');
  }

  async finalizeSale() {
    if (this.cart.length === 0) {
      this.toast('Adicione produtos ao carrinho', 'err');
      return;
    }

    try {
      const total = this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const cpf = document.getElementById('cpfInput').value.replace(/\D/g, '');
      
      // Obter dados do operador
      let operatorName = 'Operador PDV';
      try {
        const user = await this.app.account.get();
        operatorName = user.name || user.email;
      } catch (e) {}

      // Buscar dados do cliente se CPF fornecido
      let customerData = {
        name: 'Cliente Não Identificado',
        cpf: cpf || null,
        email: null
      };

      if (cpf && cpf.length === 11) {
        try {
          // Buscar usuário pelo CPF na collection users
          const usersRes = await this.app.databases.listDocuments(CONFIG.DB, CONFIG.COL.USERS, [
            this.app.Query.equal('cpf', cpf),
            this.app.Query.limit(1)
          ]);

          if (usersRes.documents.length > 0) {
            const user = usersRes.documents[0];
            customerData.name = user.name || user.email;
            customerData.email = user.email;
          }
        } catch (e) {
          console.log('[PDV] Cliente não encontrado, usando dados básicos');
        }
      }

      // Criar pedido
      const order = {
        user: customerData.name,
        cpf: customerData.cpf,
        email: customerData.email,
        operator: operatorName,
        items: this.cart.map(item => ({
          productId: item.$id,
          name: item.name,
          price: item.price,
          qty: item.qty
        })),
        total: total,
        status: 'PAGO',
        payment: 'Dinheiro',
        $createdAt: new Date().toISOString()
      };

      await this.app.databases.createDocument(CONFIG.DB, CONFIG.COL.ORDERS, this.app.ID.unique(), order);

      this.toast('✅ Venda finalizada com sucesso!', 'ok');
      
      // Limpar tudo
      this.cart = [];
      this.renderCart();
      document.getElementById('cpfInput').value = '';
      document.getElementById('productSearch').value = '';
      this.clearProductSelection();
    } catch (e) {
      console.error('[PDV] Erro ao finalizar venda:', e);
      this.toast('Erro ao finalizar venda: ' + e.message, 'err');
    }
  }
}

const page = new PDVPage();
window.pdvPage = page;
page.init();
</script>
</body>
</html>
