<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro â€” HIVERCAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/page-error.css">
</head>
<body>

<canvas id="canvas"></canvas>
<div class="grid-bg"></div>

<div class="stage">
  <div class="card">

    <div class="err-code" id="errCode" data-code="500">500</div>
    <div class="err-title" id="errTitle">ERRO INTERNO DO SERVIDOR</div>
    <p class="err-desc" id="errDesc">
      Algo deu errado no servidor. Nossa equipe foi notificada automaticamente.
      VocÃª serÃ¡ redirecionado em instantes ou pode voltar manualmente.
    </p>
    <p class="err-ctx" id="errCtx"></p>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="history.back()">
        â† Voltar
      </button>
      <a class="btn btn-ghost" href="index.html">
        ðŸ  InÃ­cio
      </a>
      <button class="btn btn-ghost" onclick="location.reload()">
        â†º Tentar novamente
      </button>
    </div>

    <div class="net-badge">
      <span class="net-dot" id="netDot"></span>
      <span id="netLabel">Verificando conexÃ£oâ€¦</span>
    </div>

  </div>
</div>

<script>
// â”€â”€ Lerparams da URL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const params  = new URLSearchParams(location.search)
const code    = parseInt(params.get("code") || "500", 10)
const ctx     = params.get("ctx") || ""

// â”€â”€ ConfiguraÃ§Ã£o por cÃ³digo HTTP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const config = {
  400: { title: "REQUISIÃ‡ÃƒO INVÃLIDA",          desc: "Os dados enviados sÃ£o invÃ¡lidos ou estÃ£o incompletos. Volte e verifique as informaÃ§Ãµes." },
  401: { title: "ACESSO NÃƒO AUTORIZADO",        desc: "Sua sessÃ£o expirou ou vocÃª nÃ£o estÃ¡ autenticado. FaÃ§a login para continuar.", redirect: "login.html", delay: 4000 },
  403: { title: "ACESSO PROIBIDO",              desc: "VocÃª nÃ£o tem permissÃ£o para acessar este recurso. Verifique sua conta ou entre em contato com o suporte." },
  404: { title: "RECURSO NÃƒO ENCONTRADO",       desc: "O item que vocÃª procura nÃ£o existe mais ou foi removido.", redirect: "page404.html", delay: 3000 },
  408: { title: "TEMPO ESGOTADO",               desc: "A conexÃ£o demorou demais para responder. Verifique sua rede e tente novamente." },
  429: { title: "MUITAS REQUISIÃ‡Ã•ES",           desc: "VocÃª fez muitas tentativas em pouco tempo. Aguarde alguns instantes antes de tentar novamente." },
  500: { title: "ERRO INTERNO DO SERVIDOR",     desc: "Algo deu errado em nosso servidor. Nossa equipe foi notificada. Tente novamente em alguns minutos." },
  502: { title: "GATEWAY INVÃLIDO",             desc: "O servidor estÃ¡ temporariamente indisponÃ­vel. Aguarde e tente novamente." },
  503: { title: "SERVIÃ‡O INDISPONÃVEL",         desc: "O sistema estÃ¡ em manutenÃ§Ã£o ou sobrecarregado. Tente novamente em breve." },
}

const cfg = config[code] || {
  title: "ERRO INESPERADO",
  desc: "Ocorreu um problema que nÃ£o conseguimos identificar. Tente novamente ou entre em contato com o suporte.",
}

// â”€â”€ Preenche card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
document.getElementById("errCode").textContent                = code
document.getElementById("errCode").dataset.code              = code
document.getElementById("errTitle").textContent              = cfg.title
document.getElementById("errDesc").textContent               = cfg.desc

if (ctx) {
  const ctxEl = document.getElementById("errCtx")
  ctxEl.textContent   = "mÃ³dulo: " + ctx
  ctxEl.style.display = "block"
}

// â”€â”€ Auto-redirect com barra de progresso â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
if (cfg.redirect && cfg.delay) {
  const bar  = document.getElementById("progressBar")
  const wrap = document.getElementById("progressWrap")
  wrap.style.display = "block"

  const start   = performance.now()
  const duration = cfg.delay

  ;(function tick(now) {
    const elapsed = now - start
    const pct     = Math.max(0, 100 - (elapsed / duration) * 100)
    bar.style.width = pct + "%"
    if (elapsed < duration) requestAnimationFrame(tick)
    else window.location.href = cfg.redirect
  })(start)
}

// â”€â”€ Status de rede â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function updateNet() {
  const dot   = document.getElementById("netDot")
  const label = document.getElementById("netLabel")
  if (navigator.onLine) {
    dot.classList.add("online")
    label.textContent = "Conectado Ã  internet"
  } else {
    dot.classList.remove("online")
    label.textContent = "Sem conexÃ£o com a internet"
  }
}
updateNet()
window.addEventListener("online",  updateNet)
window.addEventListener("offline", updateNet)

// â”€â”€ PartÃ­culas â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
;(function(){
  const canvas = document.getElementById("canvas")
  if (!canvas) return
  const ctx2 = canvas.getContext("2d")
  let W, H
  const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight }
  resize()
  addEventListener("resize", resize)
  const pts = Array.from({ length: 40 }, () => ({
    x: Math.random()*2000, y: Math.random()*2000,
    vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
    r: Math.random()*1.2+.3, a: Math.random()*.3+.05,
  }));
  (function loop(){
    ctx2.clearRect(0,0,W,H)
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy
      if(p.x<0)p.x=W; if(p.x>W)p.x=0
      if(p.y<0)p.y=H; if(p.y>H)p.y=0
      ctx2.beginPath(); ctx2.arc(p.x,p.y,p.r,0,Math.PI*2)
      // partÃ­culas vermelhas para pÃ¡gina de erro
      ctx2.fillStyle=`rgba(251,18,48,${p.a})`; ctx2.fill()
    })
    requestAnimationFrame(loop)
  })()
})()
</script>
</body>
</html>
