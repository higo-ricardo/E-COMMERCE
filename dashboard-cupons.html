<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Cupons — HIVERCAR</title>
  <link rel="stylesheet" href="css/dashboard-cupons.css">
</head>
<body>
  <header>
    <div>
      <h1>Cupons & Promoções</h1>
      <div class="meta">Sprint 06 · Integração Appwrite (collections: coupons, coupon_usage)</div>
    </div>
    <div class="small" id="statusText">Pronto</div>
  </header>

  <div class="grid">
    <section id="coupon-form">
      <div class="flex-between">
        <h2>Novo cupom</h2>
        <button class="ghost" id="btnResetForm">Limpar</button>
      </div>
      <form id="formCupom">
        <div class="row">
          <div>
            <label for="code">Código (maiúsculas)</label>
            <input id="code" name="code" maxlength="32" placeholder="BLACK50" required>
          </div>
          <div>
            <label for="type">Tipo</label>
            <select id="type" name="type" required>
              <option value="percentual">Percentual (%)</option>
              <option value="fixed">Valor fixo (R$)</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label for="value">Valor</label>
            <input id="value" name="value" type="number" min="1" placeholder="Ex.: 50">
          </div>
          <div>
            <label for="maxDiscount">Teto (R$) opcional</label>
            <input id="maxDiscount" name="maxDiscount" type="number" min="0" step="0.01" placeholder="Ex.: 200">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="minOrderValue">Pedido mínimo (R$)</label>
            <input id="minOrderValue" name="minOrderValue" type="number" min="0" step="0.01" value="50">
          </div>
          <div>
            <label for="expirationDate">Validade (opcional)</label>
            <input id="expirationDate" name="expirationDate" type="date">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="usageLimit">Limite global (opcional)</label>
            <input id="usageLimit" name="usageLimit" type="number" min="0" placeholder="Ex.: 100">
          </div>
          <div>
            <label for="cpfLimit">Limite por CPF (opcional)</label>
            <input id="cpfLimit" name="cpfLimit" type="number" min="0" placeholder="Ex.: 1">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="cpf">CPF restrito (opcional)</label>
            <input id="cpf" name="cpf" maxlength="12" placeholder="Somente números">
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:24px;">
            <input id="isActive" name="isActive" type="checkbox" checked>
            <label for="isActive" style="margin:0;">Ativo</label>
          </div>
        </div>
        <div class="actions">
          <button type="submit" id="btnSalvar">Salvar cupom</button>
          <div class="msg" id="formMsg"></div>
        </div>
      </form>
    </section>

    <section id="coupon-list">
      <div class="flex-between">
        <h2>Lista de cupons</h2>
        <button class="ghost" id="btnReload">Recarregar</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Uso</th>
              <th>Validade</th>
              <th>CPF</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="muted">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="msg" id="listMsg"></div>
    </section>
  </div>

  <script type="module" src="js/dashboard-cupons.js"></script>
</body>
</html>
