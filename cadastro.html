<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>document.documentElement.classList.add("js-ready")</script>
<script>(function(){const apply=()=>{const body=document.body; if(!body) return; if(localStorage.getItem('hivercar-theme')==='light') body.classList.add('light-mode');}; if (document.body) apply(); else document.addEventListener('DOMContentLoaded', apply);})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - HIVERCAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/loja.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
<canvas id="canvas"></canvas>
<div class="grid-bg"></div>

<main class="reg-wrap">
  <div class="auth-box">
    <button class="nav-link theme-toggle" id="themeToggle" aria-label="Alternar tema" title="Alternar tema" style="position:absolute;top:-30px;right:0;background:none;border:none;color:var(--green);font-size:18px;cursor:pointer;padding:4px"><i class="fas fa-moon"></i></button>
    <a href="index.html" class="back-link" style="position:absolute;top:-30px;left:0;color:var(--green);text-decoration:none;font-size:13px"><i class="fas fa-arrow-left"></i> Voltar</a>
    <a href="index.html" class="auth-brand">
      <div class="brand-dot"></div>
      <span class="auth-brand-name">HIVERCAR AUTOPEÇAS</span>
    </a>
    <h1>CRIAR <em>CONTA</em></h1>
    <p class="auth-sub2">Preencha os dados abaixo para se cadastrar.</p>

    <!-- Dados pessoais -->
    <div class="section-label"><i class="fas fa-user"></i> Dados pessoais</div>
    <div class="field-grid">
      <div class="field full">
        <label for="name">Nome completo <span style="color:var(--red)">*</span></label>
        <input type="text" id="name" placeholder="João da Silva" autocomplete="name">
      </div>
      <div class="field full">
        <label for="email">E-mail <span style="color:var(--red)">*</span></label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
      </div>
      <div class="field">
        <label for="mobile">Celular</label>
        <input type="tel" id="mobile" placeholder="(123) 90000-0000" maxlength="16">
      </div>
      <div class="field">
        <label for="dayBirth">Data de nascimento</label>
        <input type="date" id="dayBirth">
      </div>
    </div>

    <!-- Senha -->
    <div class="section-label"><i class="fas fa-lock"></i> Senha</div>
    <div class="field-grid">
      <div class="field full">
        <label for="password">Senha <span style="color:var(--red)">*</span></label>
        <div class="password-input-wrapper">
          <input type="password" id="password" placeholder="mínimo 8 chars, letras e números" autocomplete="new-password" maxlength="64">
          <button type="button" class="password-toggle" aria-label="Mostrar senha" data-target="password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="pass-strength">
          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
          </div>
          <div class="strength-txt" id="strengthTxt">Informe uma senha</div>
        </div>
      </div>
      <div class="field full">
        <label for="confirm">Confirmar senha <span style="color:var(--red)">*</span></label>
        <div class="password-input-wrapper">
          <input type="password" id="confirm" placeholder="repita a senha" autocomplete="new-password" maxlength="64">
          <button type="button" class="password-toggle" aria-label="Mostrar senha" data-target="confirm">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Endereço -->
    <div class="section-label"><i class="fas fa-map-marker-alt"></i> Endereço</div>
    <div class="field-grid">
      <div class="field full">
        <label for="address">Logradouro</label>
        <input type="text" id="address" placeholder="Rua, Avenida..." autocomplete="street-address">
      </div>
      <div class="field">
        <label for="number">Número</label>
        <input type="number" id="number" placeholder="123" min="1" max="99999">
      </div>
      <div class="field">
        <label for="district">Bairro</label>
        <input type="text" id="district" placeholder="Centro" value="CENTRO" autocomplete="address-level2">
      </div>
      <div class="field">
        <label for="complement">Complemento</label>
        <input type="text" id="complement" placeholder="Apt, Bloco..." autocomplete="address-line2">
      </div>
      <div class="field">
        <label for="city">Cidade</label>
        <input type="text" id="city" placeholder="Chapadinha" value="CHAPADINHA" autocomplete="address-level1">
      </div>
      <div class="field">
        <label for="state">Estado</label>
        <select id="state" autocomplete="address-level1">
          <option value="MA" selected>MA</option>
          <option value="PA">PA</option>
          <option value="PI">PI</option>
          <option value="CE">CE</option>
          <option value="SP">SP</option>
          <option value="RJ">RJ</option>
          <option value="MG">MG</option>
          <option value="BA">BA</option>
        </select>
      </div>
      <div class="field">
        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="65500-000" maxlength="9" autocomplete="postal-code">
      </div>
    </div>

    <!-- Termos -->
    <label class="checkbox-row">
      <input type="checkbox" id="chkTermos" required>
      <span>Li e aceito os <a href="termos-uso.html" target="_blank">Termos de Uso</a> e a <a href="privacidade.html" target="_blank">Política de Privacidade</a>.</span>
    </label>

    <button type="button" id="btnCadastrar" class="btn btn-primary btn-block btn-lg" style="margin-top:18px">
      <i class="fas fa-user-plus"></i> CRIAR CONTA
    </button>

    <div id="msgBox" role="alert" aria-live="polite"></div>

    <div class="auth-footer-links">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>
  </div>
</main>

<script type="module" src="./js/cadastro.js"></script>
<script type="module">
import { initThemeToggle } from './js/utils.js';
initThemeToggle();
</script>

<!-- Listeners de erro para diagnóstico em produção -->
<script>
  window.addEventListener("error", function(e) {
    console.error("[CADASTRO] Erro:", e.message, "em", e.filename);
  });
  window.addEventListener("unhandledrejection", function(e) {
    console.error("[CADASTRO] Promise rejeitada:", e.reason);
  });
</script>
</body>
</html>
