<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Vendedor - HIVERCAR</title>
<!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
<style>

/* ============================= */
/* VARIÁVEIS */
/* ============================= */
:root {
    --primary: #5cb85c;  		/* VERDE */
    --secondary:#fb1230;	/* VERMELHO*/
    --success: #26fd71;		/* VERDE NEON */		
    --darkness:#201D24; 			/* PRETO SIDERAL */ 
    --dark:#2d2c2b; 			/* PRETO*/ 
    --light: #f5f5f5;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body { display:flex; background:var(--light); }

.sidebar {
    width:220px;
    background:var(--dark);
    color:var(--light);
    min-height:100vh;
    padding:20px;
}

.sidebar a {
    display:block;
    color:var(--light);
    margin-bottom:15px;
    text-decoration:none;
}

.sidebar a:hover { color:var(--success); }

.main {
    flex:1;
    padding:30px;
}

.card {
    background:var(--light);
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}

button {
    padding:8px 12px;
    background:var(--darkness);
    color:var(--light);
    border:none;
    cursor:pointer;
}

button:hover {
    background:var(--success);
    color:#000;
}

</style>
</head>

<body>

<div class="sidebar">
    <h3>Vendedor</h3>
    <a href="#" onclick="loadDashboard()">DASHBOARD</a>
    <a href="#" onclick="loadPedidos()">Meus Pedidos</a>
    <a href="#" onclick="showCreatePedido()">Novo Pedido</a>
    <a href="#" onclick="logout()">Sair</a>
</div>

<div class="main">
    <div id="content"></div>
</div>

<!-- APPWRITER -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script><!-- SDK -->

<script src="js/appwrite.js"></script>     <!-- cria client, account, databases -->
<script src="js/constants.js"></script>    <!-- DATABASE_ID, COLLECTIONS -->
<script src="js/auth.js"></script>         <!-- middleware usa account + databases -->
<script src="js/seller.js"></script>

</body>
</html>
