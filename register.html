<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro — HIVERCAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<canvas id="canvas"></canvas>
<div class="grid-bg"></div>

<div class="auth-box">

  <a href="index.html" class="auth-brand">
    <div class="auth-brand-dot"></div>
    <span class="auth-brand-name">HIVERCAR AUTOPEÇAS</span>
  </a>

  <h1>NOVO <em>CADASTRO</em></h1>
  <p class="auth-subtitle">Criação de conta — uso interno.</p>

  <div class="auth-warning">
    <i class="fas fa-triangle-exclamation"></i>
    Esta página é de uso interno. O cadastro de novos usuários deve ser realizado por um administrador.
  </div>

  <div class="field">
    <label for="name">Nome Completo</label>
    <input type="text" id="name" placeholder="Nome do usuário" autocomplete="name">
  </div>

  <div class="field">
    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="usuario@email.com" autocomplete="email">
  </div>

  <div class="field">
    <label for="password">Senha <span style="font-size:10px;color:var(--muted)">(mín. 8 caracteres)</span></label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
  </div>

  <div class="field">
    <label for="role">Perfil</label>
    <select id="role">
      <option value="client">Cliente</option>
      <!-- Seller e Admin são definidos pelo painel administrativo -->
    </select>
  </div>

  <button type="button" id="btnRegister" class="btn-submit">CADASTRAR</button>

  <div id="msg"></div>

  <div class="auth-footer">
    Já tem conta? <a href="login.html">Fazer login</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script src="js/appwrite.js"></script>
<script src="js/constants.js"></script>

<script>
/* ── PARTICLES ── */
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
let W, H, pts = [];
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener("resize", resize);
class P { constructor(){ this.x=Math.random()*W; this.y=Math.random()*H; this.vx=(Math.random()-.5)*.3; this.vy=(Math.random()-.5)*.3; this.s=Math.random()*1.4+.3; this.a=Math.random()*.35+.05; this.c=Math.random()>.7?"#26fd71":"#fb1230"; } update(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0)this.x=W; if(this.x>W)this.x=0; if(this.y<0)this.y=H; if(this.y>H)this.y=0; } draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fillStyle=this.c; ctx.globalAlpha=this.a; ctx.fill(); } }
for(let i=0;i<70;i++) pts.push(new P());
(function loop(){ ctx.clearRect(0,0,W,H); pts.forEach(p=>{p.update();p.draw();}); for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){ const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y); if(d<110){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.strokeStyle="#26fd71"; ctx.globalAlpha=(1-d/110)*.04; ctx.lineWidth=.5; ctx.stroke(); }} ctx.globalAlpha=1; requestAnimationFrame(loop); })();
document.addEventListener("click", e=>{ const r=document.createElement("div"); r.className="ripple"; r.style.left=e.clientX+"px"; r.style.top=e.clientY+"px"; document.body.appendChild(r); setTimeout(()=>r.remove(),600); });

/* ── APPWRITE ── */
const { Client, Account, Databases, ID } = Appwrite;
const client = new Client().setEndpoint("https://nyc.cloud.appwrite.io/v1").setProject("69a0c93200084defefe1");
const account = new Account(client);
const databases = new Databases(client);
const DATABASE_ID = "69a0ebc70034fa76feff";
const COLLECTION_PROFILES = "profiles";

let inProgress = false;

document.getElementById("btnRegister").addEventListener("click", registerUser);
document.getElementById("password").addEventListener("keydown", e => { if(e.key==="Enter") registerUser(); });

async function registerUser() {
  if (inProgress) return;
  inProgress = true;

  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const role     = document.getElementById("role").value;
  const msg      = document.getElementById("msg");

  msg.className = ""; msg.textContent = "";

  if (!name || !email || !password) {
    msg.className = "error"; msg.textContent = "Preencha todos os campos.";
    inProgress = false; return;
  }
  if (password.length < 8) {
    msg.className = "error"; msg.textContent = "A senha deve ter no mínimo 8 caracteres.";
    inProgress = false; return;
  }

  const btn = document.getElementById("btnRegister");
  btn.disabled = true;

  try {
    const user = await account.create(ID.unique(), email, password, name);
    await databases.createDocument(DATABASE_ID, COLLECTION_PROFILES, ID.unique(), {
      user_id: user.$id,
      name: name,
      role: role,
      status: true
    });
    msg.className = "success";
    msg.textContent = "✅ Cadastro realizado! Redirecionando para o login...";
    setTimeout(() => { window.location.href = "login.html"; }, 2000);
  } catch(err) {
    msg.className = "error";
    msg.textContent = err.code === 409 ? "Este email já está cadastrado." : err.message;
    console.error("❌", err);
  } finally {
    inProgress = false;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
