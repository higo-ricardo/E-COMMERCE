<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - HIVERCAR</title>
<!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
   

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e1e1e,#2c2c2c);
}

.register-box {
    background:#ffffff;
    padding:40px;
    border-radius:12px;
    width:100%;
    max-width:450px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.register-box h2 {
    text-align:center;
    margin-bottom:25px;
}

input, select {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button {
    width:100%;
    padding:12px;
    background:#26fd71;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#1e1e1e;
    color:#fff;
}

button:disabled {
    background:#aaa;
    cursor:not-allowed;
}

#error {
    margin-top:10px;
    color:red;
    text-align:center;
    font-size:14px;
}

.success {
    color:green;
}
</style>
</head>

<body>

<div class="register-box">
    <h2>Cadastro de Usuário</h2>

    <input type="text" id="name" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Senha">

    <select id="role">
        <option value="client">Cliente</option>
        <option value="seller">Vendedor</option>
        <option value="admin">Administrador</option>
    </select>

    <button type="button" id="btnRegister">Cadastrar</button>

    <div id="error"></div>
</div>

<!-- APPWRITE SDK -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

<script>

/* ============================= */
/* CONFIGURAÇÃO APPWRITE */
/* ============================= */

const { Client, Account, Databases, ID } = Appwrite;

const client = new Client()
    .setEndpoint("https://nyc.cloud.appwrite.io/v1")
    .setProject("69a0c93200084defefe1");

const account = new Account(client);
const databases = new Databases(client);

/* ============================= */
/* CONSTANTES */
/* ============================= */

const DATABASE_ID = "69a0ebc70034fa76feff";
const COLLECTION_PROFILES = "profiles";

/* ============================= */
/* ESTADO */
/* ============================= */

let registerInProgress = false;

document.getElementById("btnRegister").addEventListener("click", registerUser);

/* ============================= */
/* FUNÇÃO DE CADASTRO */
/* ============================= */

async function registerUser() {

    if (registerInProgress) return;

    registerInProgress = true;

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;
    const errorBox = document.getElementById("error");

    errorBox.innerText = "";

    if (!name || !email || !password) {
        errorBox.innerText = "Preencha todos os campos.";
        registerInProgress = false;
        return;
    }

    try {

        console.log("🔵 Criando usuário no Auth...");

        /* 1️⃣ CRIAR USUÁRIO NO AUTH */
        const user = await account.create(
            ID.unique(),
            email,
            password,
            name
        );

        console.log("🟢 Usuário criado no Auth:", user);

        console.log("🔵 Criando profile vinculado...");

        /* 2️⃣ CRIAR PROFILE NO BANCO */
        await databases.createDocument(
            DATABASE_ID,
            COLLECTION_PROFILES,
            ID.unique(),
            {
                user_id: user.$id,   // 🔥 VÍNCULO CORRETO
                name: name,
                role: role,
                status: true
            }
        );

        console.log("🟢 Profile criado com sucesso");

        errorBox.classList.add("success");
        errorBox.innerText = "Usuário cadastrado com sucesso!";

    } catch (error) {

        console.error("❌ Erro no cadastro:", error);
        errorBox.innerText = error.message;

    } finally {
        registerInProgress = false;
    }
}

</script>

</body>
</html>
