<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Moderna</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #6c63ff;
  --dark: #111827;
  --light: #ffffff;
  --gray: #1f2937;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #6c63ff, #00c9ff);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 1.5rem;
  font-weight: 700;
}

.cart-icon {
  position: relative;
  cursor: pointer;
  font-size: 1.5rem;
}

.cart-count {
  position: absolute;
  top: -8px;
  right: -10px;
  background: red;
  font-size: 0.7rem;
  padding: 3px 7px;
  border-radius: 50%;
}

/* PRODUCTS */
.products {
  padding: 60px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.product {
  background: var(--gray);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-8px);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 15px 0 10px;
}

.product button {
  background: var(--primary);
  border: none;
  padding: 10px 20px;
  border-radius: 25px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

.product button:hover {
  opacity: 0.8;
}

/* CART SIDEBAR */
.cart {
  position: fixed;
  top: 0;
  right: -400px;
  width: 350px;
  height: 100%;
  background: var(--dark);
  padding: 20px;
  transition: 0.4s;
  overflow-y: auto;
}

.cart.active {
  right: 0;
}

.cart h2 {
  margin-bottom: 20px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.cart-item button {
  background: red;
  border: none;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}

.cart-total {
  margin-top: 20px;
  font-weight: bold;
  font-size: 1.2rem;
}

.checkout-btn {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: var(--primary);
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

@media(max-width: 500px) {
  .cart {
    width: 100%;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">Minha Loja</div>
  <div class="cart-icon" id="cartIcon">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </div>
</header>

<section class="products" id="productList"></section>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Seu Carrinho</h2>
  <div id="cartItems"></div>
  <div class="cart-total" id="cartTotal">Total: R$ 0</div>
  <button class="checkout-btn">Finalizar Compra</button>
</div>

<script>
const products = [
  { id: 1, name: "Camiseta Premium", price: 89.90, image: "https://picsum.photos/300?1" },
  { id: 2, name: "Tênis Moderno", price: 249.90, image: "https://picsum.photos/300?2" },
  { id: 3, name: "Relógio Elegante", price: 399.90, image: "https://picsum.photos/300?3" },
  { id: 4, name: "Mochila Estilosa", price: 159.90, image: "https://picsum.photos/300?4" }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const productList = document.getElementById("productList");
const cartElement = document.getElementById("cart");
const cartIcon = document.getElementById("cartIcon");
const cartItems = document.getElementById("cartItems");
const cartCount = document.getElementById("cartCount");
const cartTotal = document.getElementById("cartTotal");

function renderProducts() {
  productList.innerHTML = "";
  products.forEach(product => {
    productList.innerHTML += `
      <div class="product">
        <img src="${product.image}" alt="${product.name}">
        <h3>${product.name}</h3>
        <p>R$ ${product.price.toFixed(2)}</p>
        <button onclick="addToCart(${product.id})">Adicionar</button>
      </div>
    `;
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  saveCart();
  renderCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  renderCart();
}

function renderCart() {
  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;
    cartItems.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <div>
          R$ ${item.price.toFixed(2)}
          <button onclick="removeFromCart(${index})">X</button>
        </div>
      </div>
    `;
  });

  cartTotal.textContent = "Total: R$ " + total.toFixed(2);
  cartCount.textContent = cart.length;
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

cartIcon.addEventListener("click", () => {
  cartElement.classList.toggle("active");
});

renderProducts();
renderCart();
</script>

</body>
</html>
