<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja — HIVERCAR AUTOPEÇAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="loja.css">
<style>
/* Filtros */
.filters-bar {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 1px;
}
.filter-group {
  display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px;
}
.filter-label {
  font-size: 10px; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted);
}
.filter-select, .filter-input {
  background: var(--dark); border: 1px solid var(--border);
  color: var(--white); padding: 9px 12px;
  font-family: 'Barlow', sans-serif; font-size: 13px; outline: none;
  transition: border-color .2s; width: 100%;
}
.filter-select:focus, .filter-input:focus { border-color: var(--green); }
.filter-input::placeholder { color: var(--muted); }
.filter-select option { background: var(--dark); }
.btn-clear-filters {
  align-self: flex-end; padding: 9px 18px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: 'Barlow', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase; cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.btn-clear-filters:hover { color: var(--white); border-color: var(--muted); }

/* Meta de produto (categoria/veículo) */
.product-meta {
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
}
.badge-muted { background: rgba(84,86,88,.25); color: var(--muted); font-size: 10px; padding: 2px 7px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="grid-bg"></div>
<div class="toast" id="toast"></div>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-brand">
      <div class="brand-dot"></div>
      <span class="nav-brand-text">HIVERCAR <em>AUTOPEÇAS</em></span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
    <div class="nav-links" id="navMenu">
      <a href="index.html" class="nav-link"><i class="fas fa-house fa-2x"></i></a>
      <a href="login.html" class="nav-link"><i class="fas fa-user fa-2x"></i></a>
      <a href="cart.html" class="nav-cart">
        <i class="fa-solid fa-cart-shopping fa-2x"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <div class="page-label"><span>Catálogo Premium</span></div>
    <h1>PEÇAS<em>&nbsp;NOVAS&nbsp;E&nbsp;ORIGINAIS</em></h1>
  </div>
</div>

<div class="store-wrap">
  <div class="container">

    <!-- Barra de busca + contador -->
    <div class="store-header">
      <div class="section-label" style="margin:0">
        <span id="productCount">Carregando...</span>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Pesquise por nome...">
        <button id="searchBtn"><i class="fas fa-magnifying-glass"></i></button>
      </div>
    </div>

    <!-- Filtros: categoria, marca, veículo -->
    <div class="filters-bar">
      <div class="filter-group">
        <span class="filter-label"><i class="fas fa-tag"></i> Categoria</span>
        <select id="filterCategory" class="filter-select">
          <option value="">Todas as Categorias</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label"><i class="fas fa-industry"></i> Marca</span>
        <select id="filterBrand" class="filter-select">
          <option value="">Todas as Marcas</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label"><i class="fas fa-car"></i> Veículo</span>
        <input type="text" id="filterVehicle" class="filter-input" placeholder="Ex: Corolla, HB20...">
      </div>
      <button id="clearFilters" class="btn-clear-filters">
        <i class="fas fa-xmark"></i> Limpar
      </button>
    </div>

    <!-- Grid de produtos -->
    <div class="products-grid" id="products">
      <div class="loading-state" style="grid-column:1/-1">
        <div class="spinner"></div> Carregando produtos...
      </div>
    </div>

    <div id="pagination" class="pagination"></div>

  </div>
</div>

<div class="bottom-bar">
  <div class="bottom-links">
    <a href="page404.html" aria-label="Instagram"><i class="fa-brands fa-square-instagram fa-2x"></i></a>
    <a href="page404.html" aria-label="YouTube"><i class="fa-brands fa-youtube fa-2x"></i></a>
    <a href="page404.html" aria-label="TikTok"><i class="fa-brands fa-tiktok fa-2x"></i></a>
  </div>
  <div class="bottom-copy">© 2026 HIVERCAR AUTOPEÇAS LTDA</div>
</div>
<script type="module" src="loja.js"></script>
</body>
</html>
