<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>(function(){var t=localStorage.getItem('hivercar-theme');if(t==='light')document.body.className='light-mode';})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes - HIVERCAR ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/loja.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/customers.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-brand">
    <div class="brand-dot"></div>
    <span class="sidebar-brand-text">HIVER<em>CAR</em></span>
  </a>
  <div class="sidebar-role">Administrador</div>
  <nav>
    <a href="dashboard.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a href="admin-pedidos.html"><i class="fas fa-chart-line"></i> Pedidos</a>
    <a href="admin-produtos.html"><i class="fas fa-box-open"></i> Produtos</a>
    <a href="admin-estoque.html"><i class="fas fa-warehouse"></i> Estoque</a>
    <a href="admin-os.html"><i class="fas fa-wrench"></i> O. de Serviço</a>
    <a href="admin-fiscal.html"><i class="fas fa-receipt"></i> Fiscal</a>
    <a href="admin-relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a>
    <a href="admin-cupons.html"><i class="fas fa-tags"></i> Cupons</a>
    <a href="customers.html" class="active"><i class="fas fa-users"></i> Clientes</a>
    <a href="loja.html"><i class="fas fa-store"></i> Loja</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="theme-toggle sidebar-theme" id="themeToggle" aria-label="Alternar tema" title="Alternar tema">
      <i class="fas fa-moon"></i>
    </button>
    <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sair</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
    <span class="topbar-title">GESTÃO DE CLIENTES</span>
    <div class="topbar-user">
      <div class="topbar-avatar"><i class="fas fa-user"></i></div>
      <span id="userName">Admin</span>
      <div class="status-dot green"></div>
    </div>
  </div>

  <div class="content">
    <!-- Métricas -->
    <div class="metrics-grid mb-5">
      <div class="metric-card"><div class="metric-value" id="mTotal">-</div><div class="metric-label">Total de Clientes</div></div>
      <div class="metric-card"><div class="metric-value" id="mAtivos">-</div><div class="metric-label">Contas Ativas</div></div>
      <div class="metric-card red"><div class="metric-value" id="mBloqueados">-</div><div class="metric-label">Bloqueados</div></div>
      <div class="metric-card"><div class="metric-value" id="mHoje">-</div><div class="metric-label">Cadastros Hoje</div></div>
    </div>

    <!-- Busca -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar por nome, e-mail ou CPF…">
      <select id="filterStatus" class="form-input">
        <option value="">Todos</option>
        <option value="ativos">Ativos</option>
        <option value="bloqueados">Bloqueados</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="btnRefresh">
        <i class="fas fa-arrows-rotate"></i>
      </button>
    </div>

    <!-- Tabela -->
    <div class="panel-wrap card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>CPF</th>
            <th>Cidade</th>
            <th>Cadastro</th>
            <th>Último Login</th>
            <th>Status</th>
            <th style="width:100px">Ações</th>
          </tr>
        </thead>
        <tbody id="customersTable">
          <tr><td colspan="8" class="loading-state"><span class="spinner"></span> Carregando…</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="paginacao"></div>
    </div>
  </div>
</div>

<!-- Modal detalhe do cliente -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">CLIENTE</span>
      <button class="modal-close" id="modalClose"><i class="fas fa-xmark"></i></button>
    </div>
    <div id="modalBody"></div>
    <div class="flex gap-3 mt-5 justify-end" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module">
import { AdminPage, fmtDate, fmtDateTime, esc, Query } from "./js/admin-core.js";
import { initParticles } from "./js/utils.js";

class CustomersPage extends AdminPage {
  allCustomers = [];
  filtered = [];
  currentPage = 1;
  PAGE_SIZE = 20;

  onInit() {
    initParticles();
    this.bindEvents();
    this.loadCustomers();
  }

  bindEvents() {
    document.getElementById("btnRefresh").addEventListener("click", () => this.loadCustomers());
    document.getElementById("searchInput").addEventListener("input", () => this.applyFilter());
    document.getElementById("filterStatus").addEventListener("change", () => this.applyFilter());
    document.getElementById("modalClose").addEventListener("click", () => {
      document.getElementById("modalOverlay").classList.remove("open");
    });
    document.getElementById("modalOverlay").addEventListener("click", e => {
      if (e.target === e.currentTarget) {
        document.getElementById("modalOverlay").classList.remove("open");
      }
    });
  }

  async loadCustomers() {
    try {
      const res = await this.app.databases.listDocuments(CONFIG.DB, CONFIG.COL_USERS, [
        Query.orderDesc("$createdAt"),
        Query.limit(200),
      ]);
      this.allCustomers = res.documents;
      this.applyFilter();
    } catch (e) {
      console.error("[Customers] Erro ao carregar:", e);
      this.toast("Erro ao carregar clientes.", "err");
    }
  }

  applyFilter() {
    const search = document.getElementById("searchInput").value.trim().toLowerCase();
    const status = document.getElementById("filterStatus").value;
    this.filtered = this.allCustomers.filter(c => {
      if (search) {
        const name = (c.name || "").toLowerCase();
        const email = (c.email || "").toLowerCase();
        const cpf = (c.cpf || "").replace(/\D/g, "");
        const q = search.replace(/\D/g, "");
        if (!name.includes(search) && !email.includes(search) && !cpf.includes(q)) return false;
      }
      if (status === "ativos" && c.isActive === false) return false;
      if (status === "bloqueados" && c.isActive !== false) return false;
      return true;
    });
    this.currentPage = 1;
    this.renderPage();
  }

  renderPage() {
    const start = (this.currentPage - 1) * this.PAGE_SIZE;
    const page = this.filtered.slice(start, start + this.PAGE_SIZE);
    const pages = Math.ceil(this.filtered.length / this.PAGE_SIZE);

    // Metrics
    document.getElementById("mTotal").textContent = this.allCustomers.length;
    document.getElementById("mAtivos").textContent = this.allCustomers.filter(c => c.isActive !== false).length;
    document.getElementById("mBloqueados").textContent = this.allCustomers.filter(c => c.isActive === false).length;
    document.getElementById("mHoje").textContent = this.allCustomers.filter(c => {
      if (!c.$createdAt) return false;
      return new Date(c.$createdAt).toDateString() === new Date().toDateString();
    }).length;

    // Table
    this.renderTable(document.getElementById("customersTable"), page, c => `
      <tr>
        <td class="font-semibold text-sm">${esc(c.name || "Sem nome")}</td>
        <td class="text-xs">${esc(c.email || "-")}</td>
        <td class="text-xs text-muted" style="font-family:monospace">${esc(c.cpf || "-")}</td>
        <td><span class="badge ${c.isActive !== false ? 'badge-green' : 'badge-red'}">${c.isActive !== false ? 'Ativo' : 'Bloqueado'}</span></td>
        <td class="text-xs text-muted">${fmtDate(c.lastLogin)}</td>
        <td class="text-xs">${fmtDate(c.$createdAt)}</td>
        <td class="text-center">
          <button class="btn btn-ghost btn-sm btn-detalhe" data-id="${c.$id}"><i class="fas fa-eye"></i></button>
        </td>
      </tr>
    `);

    // Pagination
    this.renderPagination(this.currentPage, pages);

    // Bind detail buttons
    document.querySelectorAll(".btn-detalhe").forEach(btn => {
      btn.addEventListener("click", () => {
        const customer = this.filtered.find(c => c.$id === btn.dataset.id);
        if (customer) this.openDetalhe(customer);
      });
    });
  }

  renderPagination(page, pages) {
    const el = document.getElementById("paginacao");
    if (!el) return;
    if (pages <= 1) { el.innerHTML = ""; return; }
    let html = `<button class="btn btn-ghost btn-sm" ${page <= 1 ? "disabled" : ""} id="pagPrev"><i class="fas fa-chevron-left"></i></button>`;
    for (let i = 1; i <= pages; i++) {
      html += `<button class="btn btn-sm ${i === page ? 'btn-primary' : 'btn-ghost'} pag-num" data-p="${i}">${i}</button>`;
    }
    html += `<button class="btn btn-ghost btn-sm" ${page >= pages ? "disabled" : ""} id="pagNext"><i class="fas fa-chevron-right"></i></button>`;
    el.innerHTML = html;

    document.getElementById("pagPrev")?.addEventListener("click", () => { this.currentPage--; this.renderPage(); });
    document.getElementById("pagNext")?.addEventListener("click", () => { this.currentPage++; this.renderPage(); });
    document.querySelectorAll(".pag-num").forEach(b => {
      b.addEventListener("click", () => { this.currentPage = parseInt(b.dataset.p); this.renderPage(); });
    });
  }

  openDetalhe(c) {
    document.getElementById("modalTitle").textContent = c.name || "Cliente";
    const blocked = c.isActive === false;
    document.getElementById("modalBody").innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><strong>Email:</strong> ${esc(c.email)}</div>
        <div><strong>CPF:</strong> ${esc(c.cpf || "-")}</div>
        <div><strong>Celular:</strong> ${esc(c.mobile || "-")}</div>
        <div><strong>Nascimento:</strong> ${esc(c.dayBirth || "-")}</div>
        <div><strong>Cidade:</strong> ${esc(c.city || "-")}</div>
        <div><strong>Estado:</strong> ${esc(c.state || "-")}</div>
        <div><strong>Último Login:</strong> ${fmtDateTime(c.lastLogin)}</div>
        <div><strong>Tentativas:</strong> ${c.failedLogin || 0}</div>
        <div><strong>IP:</strong> ${esc(c.lastIP || "-")}</div>
        <div><strong>Role:</strong> ${esc(c.role || "-")}</div>
      </div>
    `;
    document.getElementById("modalActions").innerHTML = `
      <button class="btn btn-ghost btn-sm" id="modalFechar">Fechar</button>
      <button class="btn ${blocked ? 'btn-primary' : 'btn-danger'} btn-sm" id="modalToggle">
        ${blocked ? "Desbloquear" : "Bloquear"}
      </button>
    `;
    document.getElementById("modalFechar").addEventListener("click", () => {
      document.getElementById("modalOverlay").classList.remove("open");
    });
    document.getElementById("modalToggle").addEventListener("click", async () => {
      await this.toggleBlock(c.$id, blocked);
      document.getElementById("modalOverlay").classList.remove("open");
    });
    document.getElementById("modalOverlay").classList.add("open");
  }

  async toggleBlock(id, isCurrentlyBlocked) {
    try {
      await this.app.databases.updateDocument(CONFIG.DB, CONFIG.COL_USERS, id, {
        isActive: isCurrentlyBlocked,
      });
      this.toast(isCurrentlyBlocked ? "Cliente desbloqueado." : "Cliente bloqueado.", "success");
      this.loadCustomers();
    } catch (e) {
      this.toast("Erro ao atualizar: " + e.message, "err");
    }
  }
}

const page = new CustomersPage();
page.init();
</script>
</body>
</html>
