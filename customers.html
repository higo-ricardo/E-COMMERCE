<div class="main">

  <div class="content">
    <!-- MÃ©tricas -->

      <div class="metric-card"><div class="metric-value" id="mTotal">â€”</div><div class="metric-label">Total de Clientes</div></div>
      <div class="metric-card"><div class="metric-value" id="mAtivos">â€”</div><div class="metric-label">Contas Ativas</div></div>

    <!-- Busca -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar por nome, e-mail ou CPFâ€¦">

<!-- Modal detalhe do cliente -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

<div class="toast" id="toast"></div>

<script type="module">
// â”€â”€ CONFIG (inline) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const CONFIG = {
  ENDPOINT:   "https://tor.cloud.appwrite.io/v1",
  PROJECT_ID: "69c7e94a003a1c86b7ca",
  DB:         "69c7e9af00296b17179e",
  COL_USERS:  "users",
  PAGE_SIZE:  20,
}

import { Client, Databases, Account, Query }
  from "https://cdn.jsdelivr.net/npm/appwrite@13.0.0/+esm"

const client    = new Client().setEndpoint(CONFIG.ENDPOINT).setProject(CONFIG.PROJECT_ID)
const databases = new Databases(client)
const account   = new Account(client)

// â”€â”€ GUARD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
;(async () => {
  try {
    const user = await account.get()
    document.getElementById("userName").textContent = user.name || "Admin"
  } catch {
    window.location.href = "login.html"; return
  }
  init()
})()

// â”€â”€ ESTADO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let allCustomers = []
let filtered     = []
let currentPage  = 1
const PAGE_SIZE  = CONFIG.PAGE_SIZE

// â”€â”€ UTILS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")
}
let toastT
function toast(msg, type="") {
  const el = document.getElementById("toast")
  el.textContent = msg
  el.className = "toast show" + (type?" "+type:"")
  clearTimeout(toastT)
  toastT = setTimeout(()=>el.classList.remove("show"), 3500)
}
function fmtDate(iso) {
  if (!iso) return "â€”"
  return new Date(iso).toLocaleDateString("pt-BR")
}
function fmtDateTime(iso) {
  if (!iso) return "â€”"
  const d = new Date(iso)
  return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
}

// â”€â”€ LOAD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function loadCustomers() {
  try {
    const res = await databases.listDocuments(CONFIG.DB, CONFIG.COL_USERS, [
      Query.equal("role", ["cliente", "USERS"]),
      Query.orderDesc("$createdAt"),
      Query.limit(200),
    ])
    allCustomers = res.documents

    // MÃ©tricas
    const today     = new Date(); today.setHours(0,0,0,0)
    const ativos    = allCustomers.filter(c => c.isActive !== false)
    const bloqueados= allCustomers.filter(c => c.isActive === false || (c.blockedUntil && new Date(c.blockedUntil) > new Date()))
    const hoje      = allCustomers.filter(c => new Date(c.createdAt || c.$createdAt) >= today)

    document.getElementById("mTotal").textContent     = allCustomers.length
    document.getElementById("mAtivos").textContent    = ativos.length
    document.getElementById("mBloqueados").textContent= bloqueados.length
    document.getElementById("mHoje").textContent      = hoje.length

    applyFilter()
  } catch (e) {
    document.getElementById("customersTable").innerHTML =
      `<tr><td colspan="8" style="color:var(--red);padding:24px">Erro ao carregar: ${e.message}</td></tr>`
  }
}

function applyFilter() {
  const search = document.getElementById("searchInput").value.toLowerCase()
  const status = document.getElementById("filterStatus").value

  filtered = allCustomers.filter(c => {
    const matchSearch = !search ||
      (c.name  || "").toLowerCase().includes(search) ||
      (c.email || "").toLowerCase().includes(search) ||
      (c.cpf   || "").includes(search)

    const isBlocked = c.isActive === false ||
      (c.blockedUntil && new Date(c.blockedUntil) > new Date())

    const matchStatus = !status ||
      (status === "active"  && !isBlocked) ||
      (status === "blocked" &&  isBlocked)

    return matchSearch && matchStatus
  })

  currentPage = 1
  renderPage()
}

function renderPage() {
  const start   = (currentPage - 1) * PAGE_SIZE
  const slice   = filtered.slice(start, start + PAGE_SIZE)
  const pages   = Math.ceil(filtered.length / PAGE_SIZE)

  const tbody = document.getElementById("customersTable")
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--muted);padding:28px;text-align:center">
      <i class="fas fa-users" style="font-size:22px;display:block;margin-bottom:8px"></i>
      Nenhum cliente encontrado.
    </td></tr>`
    document.getElementById("paginacao").innerHTML = ""
    return
  }

  tbody.innerHTML = slice.map(c => {
    const blocked = c.isActive === false ||
      (c.blockedUntil && new Date(c.blockedUntil) > new Date())

    const badge = blocked
      ? `<span class="badge badge-red">Bloqueado</span>`
      : `<span class="badge badge-green">Ativo</span>`

    return `<tr>
      <td style="font-weight:600">${esc(c.name||"â€”")}</td>
      <td style="color:var(--muted);font-size:12px">${esc(c.email||"â€”")}</td>
      <td style="color:var(--muted);font-size:12px">${esc(c.cpf||"â€”")}</td>
      <td style="color:var(--muted)">${esc(c.city||"â€”")}</td>
      <td style="color:var(--muted);font-size:12px">${fmtDate(c.createdAt||c.$createdAt)}</td>
      <td style="color:var(--muted);font-size:12px">${fmtDate(c.lastLogin)}</td>
      <td>${badge}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm ver-btn" data-id="${c.$id}" title="Ver detalhes">
            <i class="fas fa-eye"></i>
          </button>
          <button class="btn ${blocked ? 'btn-primary' : 'btn-danger'} btn-sm toggle-btn"
            data-id="${c.$id}" data-blocked="${blocked}"
            title="${blocked ? 'Desbloquear' : 'Bloquear'}">
            <i class="fas fa-${blocked ? 'lock-open' : 'lock'}"></i>
          </button>
        </div>
      </td>
    </tr>`
  }).join("")

  // Eventos
  tbody.querySelectorAll(".ver-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const c = allCustomers.find(x => x.$id === btn.dataset.id)
      if (c) openDetalhe(c)
    })
  })
  tbody.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => toggleBlock(btn.dataset.id, btn.dataset.blocked === "true"))
  })

  // PaginaÃ§Ã£o
  renderPagination(currentPage, pages)
}

function renderPagination(page, pages) {
  const el = document.getElementById("paginacao")
  if (pages <= 1) { el.innerHTML = ""; return }

  let html = `<button class="page-btn" id="prevBtn" ${page<=1?"disabled":""}><i class="fas fa-chevron-left"></i></button>`
  for (let i = 1; i <= pages; i++) {
    html += `<button class="page-btn ${i===page?"active":""}" data-pg="${i}">${i}</button>`
  }
  html += `<button class="page-btn" id="nextBtn" ${page>=pages?"disabled":""}><i class="fas fa-chevron-right"></i></button>`
  el.innerHTML = html

  el.querySelector("#prevBtn")?.addEventListener("click", () => { currentPage--; renderPage() })
  el.querySelector("#nextBtn")?.addEventListener("click", () => { currentPage++; renderPage() })
  el.querySelectorAll(".page-btn[data-pg]").forEach(b => {
    b.addEventListener("click", () => { currentPage = +b.dataset.pg; renderPage() })
  })
}

// â”€â”€ DETALHE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function openDetalhe(c) {
  const blocked = c.isActive === false ||
    (c.blockedUntil && new Date(c.blockedUntil) > new Date())

  document.getElementById("modalTitle").textContent = c.name || "Cliente"

  document.getElementById("modalBody").innerHTML = `
    <div class="detail-row"><span class="detail-label">Nome</span><span>${esc(c.name||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">E-mail</span><span>${esc(c.email||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">CPF</span><span>${esc(c.cpf||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">Celular</span><span>${esc(c.mobile||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">EndereÃ§o</span>
      <span>${esc([c.address, c.number, c.complement].filter(Boolean).join(", ")||"â€”")}</span>
    </div>
    <div class="detail-row"><span class="detail-label">Bairro</span><span>${esc(c.district||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">Cidade/UF</span><span>${esc((c.city||"") + (c.state ? " â€” " + c.state : "")||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">CEP</span><span>${esc(c.cep||"â€”")}</span></div>
    <div class="detail-row"><span class="detail-label">Cadastro</span><span>${fmtDateTime(c.createdAt||c.$createdAt)}</span></div>
    <div class="detail-row"><span class="detail-label">Ãšltimo Login</span><span>${fmtDateTime(c.lastLogin)}</span></div>
    <div class="detail-row"><span class="detail-label">Logins</span><span>${c.loginCounter ?? 0}</span></div>
    <div class="detail-row"><span class="detail-label">Tentativas Falhas</span>
      <span style="${(c.failedLogin||0) >= 5 ? 'color:var(--red);font-weight:700' : ''}">${c.failedLogin ?? 0}</span>
    </div>
    <div class="detail-row"><span class="detail-label">Status</span>
      <span>${blocked
        ? `<span class="badge badge-red">Bloqueado</span>`
        : `<span class="badge badge-green">Ativo</span>`}
      </span>
    </div>
    ${c.blockedUntil && blocked ? `
    <div class="detail-row"><span class="detail-label">Bloqueado atÃ©</span>
      <span style="color:var(--red)">${fmtDateTime(c.blockedUntil)}</span>
    </div>` : ""}
  `

  document.getElementById("modalActions").innerHTML = `
    <button class="btn btn-ghost btn-sm" id="modalFechar">Fechar</button>
    <button class="btn ${blocked ? 'btn-primary' : 'btn-danger'} btn-sm" id="modalToggle">
      <i class="fas fa-${blocked ? 'lock-open' : 'lock'}"></i>
      ${blocked ? "Desbloquear Conta" : "Bloquear Conta"}
    </button>
  `
  document.getElementById("modalFechar").addEventListener("click", () => {
    document.getElementById("modalOverlay").classList.remove("open")
  })
  document.getElementById("modalToggle").addEventListener("click", () => {
    document.getElementById("modalOverlay").classList.remove("open")
    toggleBlock(c.$id, blocked)
  })

  document.getElementById("modalOverlay").classList.add("open")
}

// â”€â”€ TOGGLE BLOQUEIO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function toggleBlock(id, isCurrentlyBlocked) {
  try {
    const patch = isCurrentlyBlocked
      ? { isActive: true, blockedUntil: null, failedLogin: 0 }
      : { isActive: false, blockedUntil: new Date(Date.now() + 99*365*24*3600000).toISOString() }

    await databases.updateDocument(CONFIG.DB, CONFIG.COL_USERS, id, patch)
    toast(isCurrentlyBlocked ? "Conta desbloqueada." : "Conta bloqueada.")
    await loadCustomers()
  } catch (e) {
    toast("Erro: " + e.message, "error")
  }
}

// â”€â”€ INIT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function init() {
  document.getElementById("logoutBtn").addEventListener("click", async e => {
    e.preventDefault()
    await account.deleteSession("current").catch(()=>{})
    window.location.href = "login.html"
  })

  document.getElementById("modalClose").addEventListener("click", () => {
    document.getElementById("modalOverlay").classList.remove("open")
  })
  document.getElementById("modalOverlay").addEventListener("click", e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove("open")
  })

  let searchTimer
  document.getElementById("searchInput").addEventListener("input", () => {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(applyFilter, 300)
  })
  document.getElementById("filterStatus").addEventListener("change", applyFilter)
  document.getElementById("btnRefresh").addEventListener("click", loadCustomers)

  loadCustomers()
}
</script>
</body>
</html>
