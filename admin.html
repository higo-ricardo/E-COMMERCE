<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Gerente - HIVERCAR</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">


<style>

/* ============================= */
/* VARIÁVEIS */
/* ============================= */
:root {
    --primary: #5cb85c;  		/* VERDE */
    --secondary:#fb1230;	/* VERMELHO*/
    --success: #26fd71;		/* VERDE NEON */		
    --darkness:#201D24; 			/* PRETO SIDERAL */
    --dark:#2d2c2b; 			/* PRETO*/ 
    --light: #f5f5f5;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body {
    display:flex;
    background:var(--light);
}

/* SIDEBAR */
.sidebar {
    width:250px;
    background:var(--darkness);
    color:var(--light);
    min-height:100vh;
    padding:20px;
}

.sidebar h2 {
    margin-bottom:30px;
}

.sidebar a {
    display:block;
    color:var(--light);
    text-decoration:none;
    margin-bottom:15px;
    transition:0.3s;
}

.sidebar a:hover {
    color:var(--success);
}

/* MAIN */
.main {
    flex:1;
    padding:30px;
}

.card-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card {
    background:var(--light);
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button {
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:var(--darkness);
    color:var(--light);
    cursor:pointer;
}

button:hover {
    background:var(--success);
    color:var(--dark);
}

table {
    width:100%;
    border-collapse:collapse;
    background:var(--light);
    border-radius:10px;
    overflow:hidden;
}

th, td {
    padding:12px;
    text-align:left;
}

th {
    background:var(--darkness);
    color:var(--light);
}

input, select, textarea {
    width:100%;
    padding:8px;
    margin-bottom:10px;
}
.dashboard-card{

cursor:pointer;
text-align:center;
transition:.3s;
}

.dashboard-card i{

font-size:28px;
margin-bottom:10px;
color:var(--primary);

}

.dashboard-card:hover{

transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);

}
</style>
</head>

<body>

<div class="sidebar">
    
    <h2>HIVERCAR</h2>

    <a href="#" onclick="loadDashboard()">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="#" onclick="loadServices()">
        <i class="fas fa-wrench"></i> Serviços
    </a>

    <a href="#" onclick="loadInventory()">
        <i class="fas fa-box"></i> Inventário
    </a>

    <a href="#" onclick="loadBilling()">
        <i class="fas fa-chart-line"></i> Faturamento
    </a>

    <a href="#" onclick="loadSellers()">
        <i class="fas fa-users"></i> Vendedores
    </a>

    <a href="#" onclick="loadLowStock()">
    <i class="fas fa-exclamation-triangle"></i>
    Estoque Baixo
    </a>
    
    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Sair
    </a>
    
</div>

<div class="main">
    <div id="content"></div>
</div>

<!-- APPWRITER -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script><!-- SDK -->

<script src="js/appwrite.js"></script>     <!-- cria client, account, databases -->
<script src="js/constants.js"></script>    <!-- DATABASE_ID, COLLECTIONS -->
<script src="js/auth.js"></script>         <!-- middleware usa account + databases -->
<script src="js/admin.js"></script>        <!-- usa protectRoute() -->

</body>
</html>
