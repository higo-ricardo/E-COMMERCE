<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - HIVERCAR</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body {
    display:flex;
    background:#f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width:250px;
    background:#1e1e1e;
    color:#fff;
    min-height:100vh;
    padding:20px;
}

.sidebar h2 {
    margin-bottom:30px;
}

.sidebar a {
    display:block;
    color:#ccc;
    text-decoration:none;
    margin-bottom:15px;
    transition:0.3s;
}

.sidebar a:hover {
    color:#26fd71;
}

/* MAIN */
.main {
    flex:1;
    padding:30px;
}

.card-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card {
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button {
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:#1e1e1e;
    color:#fff;
    cursor:pointer;
}

button:hover {
    background:#26fd71;
    color:#000;
}

table {
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
}

th, td {
    padding:12px;
    text-align:left;
}

th {
    background:#1e1e1e;
    color:#fff;
}

input, select, textarea {
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>HIVERCAR</h2>
    <a href="#" onclick="loadDashboard()"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="#" onclick="loadProducts()"><i class="fas fa-box"></i> Produtos</a>
    <a href="#" onclick="loadCategorias()"><i class="fas fa-tags"></i> Categorias</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
</div>

<div class="main">
    <div id="content"></div>
</div>

<!-- SDK -->
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script src="js/appwrite.js"></script>
<script src="js/constants.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
