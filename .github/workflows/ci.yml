# ─── HIVERCAR · .github/workflows/ci.yml ─────────────────────────────────────
# US-46: CI/CD Pipeline com GitHub Actions
#
# TRIGGERS:
#   - Push em qualquer branch → roda testes
#   - Pull Request para main  → roda testes + lint
#   - Push em main            → roda testes + deploy automático
#
# SEGREDOS NECESSÁRIOS (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN   — Token de deploy da Vercel
#   VERCEL_ORG_ID  — ID da organização na Vercel
#   VERCEL_PROJECT_ID — ID do projeto na Vercel
#
# SETUP VERCEL:
#   1. npm i -g vercel
#   2. vercel login && vercel link
#   3. Copie os IDs de .vercel/project.json para os secrets

name: HIVERCAR — CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Evita deploys paralelos na mesma branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1: TESTES ────────────────────────────────────────────────────────────
  test:
    name: Testes Unitários (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Validar integridade de texto (UTF-8/mojibake)
        run: npm run lint:text

      - name: Rodar testes com cobertura
        run: npm run test:coverage

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # Adiciona comentário no PR com o resumo de cobertura
      - name: Resumo de cobertura no PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ── JOB 2: DEPLOY PREVIEW (PR) ───────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull configurações da Vercel
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build do projeto
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comentar URL do preview no PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         `## ✅ Deploy Preview Pronto\n\n🔗 **URL:** ${{ steps.deploy.outputs.preview_url }}\n\nTestes passaram — ${new Date().toLocaleString('pt-BR')}`,
            })

  # ── JOB 3: DEPLOY PRODUÇÃO (main) ────────────────────────────────────────────
  deploy-production:
    name: Deploy Produção (Vercel)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://hivercar.com.br

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull configurações da Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build de produção
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy em produção
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notificar deploy via commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success'
            await github.rest.repos.createCommitStatus({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              sha:         context.sha,
              state:       success ? 'success' : 'failure',
              description: success ? 'Deploy em produção concluído' : 'Falha no deploy',
              context:     'vercel/production',
              target_url:  'https://hivercar.com.br',
            })
